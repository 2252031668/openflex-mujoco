# Head joint limits
# Both joints: ±90° (±π/2 rad), RS00 motor specs
joint_limits:
  openarmx_head_yaw_joint:
    has_position_limits: true
    min_position: -1.5708   # -90 deg
    max_position: 1.5708    #  90 deg
    max_velocity: 33.0      # RS00 max
    max_effort: 14.0        # RS00 max
  openarmx_head_pitch_joint:
    has_position_limits: true
    min_position: -1.5708   # -90 deg
    max_position: 1.5708    #  90 deg
    max_velocity: 33.0      # RS00 max
    max_effort: 14.0        # RS00 max
